services:
  - type: web
    name: telegram-userbot
    env: python
    runtime: python-3.12.0
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: DATABASE_PATH
        value: /data/userbot.db
    disk:
      name: data
      mountPath: /data
